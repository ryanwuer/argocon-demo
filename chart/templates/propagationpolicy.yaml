apiVersion: policy.karmada.io/v1alpha1
kind: PropagationPolicy
metadata:
  name: {{ include "argocon-demo.fullname" . }}
  labels:
    {{- include "argocon-demo.labels" . | nindent 4 }}
spec:
  resourceSelectors:
    - apiVersion: apps/v1
      kind: ReplicaSet
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: argocon-demo
  placement:
    clusterAffinity:
      clusterNames:
        {{- range .Values.karmada.clusters }}
        - {{ .name }}
        {{- end }}
    replicaScheduling:
      replicaDivisionPreference: Weighted
      replicaSchedulingType: Divided
      weightPreference:
        staticWeightList:
          {{- range .Values.karmada.clusters }}
          - targetCluster:
              clusterNames:
                - {{ .name }}
            weight: {{ .weight }}
          {{- end }}
